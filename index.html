<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Real-Time</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-blue-400 text-center">📊 Painel de Controle Automatizado</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700">
                <canvas id="graficoBarras"></canvas>
            </div>
            <div id="status" class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 overflow-auto max-h-64 text-sm">
                <p class="text-yellow-500 animate-pulse">Conectando ao banco de dados...</p>
            </div>
        </div>
    </div>

    <script>
        // Agora usamos o nome fixo e simples
        const URL_ARQUIVO = "dados.xlsx"; 

        async function carregar() {
            try {
                // Adicionamos um número aleatório no final para evitar que o navegador use o arquivo antigo (Cache)
                const response = await fetch(URL_ARQUIVO + '?v=' + Math.random());
                
                if (!response.ok) throw new Error("Arquivo 'dados.xlsx' não encontrado no repositório.");

                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer);
                const dados = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                if (dados.length === 0) throw new Error("A planilha está vazia!");

                exibirDados(dados);
                criarGrafico(dados);

            } catch (err) {
                document.getElementById('status').innerHTML = `<div class="text-red-500 font-bold">❌ ERRO: ${err.message}</div>`;
            }
        }

        function exibirDados(dados) {
            let html = '<table class="w-full text-left"><thead><tr class="text-blue-400 border-b border-gray-600">';
            Object.keys(dados[0]).forEach(key => html += `<th class="p-2">${key}</th>`);
            html += '</tr></thead><tbody>';
            dados.forEach(item => {
                html += '<tr class="border-b border-gray-700 hover:bg-gray-750 transition">';
                Object.values(item).forEach(val => html += `<td class="p-2 text-gray-300">${val}</td>`);
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('status').innerHTML = html;
        }

        function criarGrafico(dados) {
            const ctx = document.getElementById('graficoBarras').getContext('2d');
            const colunas = Object.keys(dados[0]);
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dados.map(d => d[colunas[0]]),
                    datasets: [{
                        label: colunas[1],
                        data: dados.map(d => d[colunas[1]]),
                        backgroundColor: '#60a5fa'
                    }]
                },
                options: { plugins: { legend: { labels: { color: 'white' } } } }
            });
        }

        carregar();
    </script>
</body>
</html>

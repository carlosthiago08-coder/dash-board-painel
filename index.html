<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Dashboard Automático</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
    </style>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-800">Painel de Dados Automático</h1>
            <p class="text-gray-600">Lendo arquivo: <strong>Pasta 1.xlsx</strong></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Análise Visual</h2>
                <canvas id="meuGrafico"></canvas>
            </div>

            <div class="card overflow-x-auto">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Dados da Planilha</h2>
                <div id="tabela-container">
                    <p class="text-gray-400">Carregando dados...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configurações do arquivo
        const NOME_ARQUIVO = "Pasta 1.xlsx";
        const URL_ARQUIVO = `https://carlosthiago08-coder.github.io/dash-board-painel/${encodeURIComponent(NOME_ARQUIVO)}`;

        async function inicializarDashboard() {
            try {
                // 1. Buscar o arquivo Excel
                const resposta = await fetch(URL_ARQUIVO);
                if (!resposta.ok) throw new Error("Arquivo não encontrado no GitHub.");
                
                const buffer = await resposta.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });

                // 2. Processar a primeira aba
                const abaNome = workbook.SheetNames[0];
                const dados = XLSX.utils.sheet_to_json(workbook.Sheets[abaNome]);

                if (dados.length === 0) {
                    document.getElementById('tabela-container').innerHTML = "A planilha está vazia.";
                    return;
                }

                // 3. Criar a Tabela HTML automaticamente
                gerarTabela(dados);

                // 4. Criar o Gráfico (Usa a primeira e a segunda coluna como base)
                gerarGrafico(dados);

            } catch (erro) {
                console.error("Erro:", erro);
                document.getElementById('tabela-container').innerHTML = `<span class="text-red-500">Erro ao carregar: ${erro.message}</span>`;
            }
        }

        function gerarTabela(dados) {
            let html = '<table class="w-full text-left border-collapse">';
            const colunas = Object.keys(dados[0]);
            
            // Cabeçalho
            html += '<tr class="border-b bg-gray-50">';
            colunas.forEach(col => html += `<th class="p-2 font-bold">${col}</th>`);
            html += '</tr>';

            // Linhas (limite de 10 para não travar)
            dados.slice(0, 10).forEach(linha => {
                html += '<tr class="border-b hover:bg-gray-50">';
                colunas.forEach(col => html += `<td class="p-2">${linha[col] || ""}</td>`);
                html += '</tr>';
            });
            html += '</table>';
            document.getElementById('tabela-container').innerHTML = html;
        }

        function gerarGrafico(dados) {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            const colunas = Object.keys(dados[0]);
            
            // Pega os nomes da 1ª coluna e os valores da 2ª coluna
            const labels = dados.map(d => d[colunas[0]]);
            const valores = dados.map(d => d[colunas[1]]);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: colunas[1] || 'Valores',
                        data: valores,
                        backgroundColor: '#3b82f6',
                        borderRadius: 5
                    }]
                },
                options: { responsive: true }
            });
        }

        // Iniciar
        inicializarDashboard();
    </script>
</body>
</html>
